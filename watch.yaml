# ================================================================
# AI 资讯监控 · 约束文件 (watch.yaml)
# 直接在 GitHub 上编辑此文件，Routine 下次运行时自动生效
# ================================================================

version: "1.1"

# ----------------------------------------------------------------
# 关注维度
# 每个 topic 独立控制：priority 影响报告排序，sources 定义从哪抓
# 不需要的 topic 整块注释掉即可
# ----------------------------------------------------------------
topics:

  # ── Claude & Anthropic 生态 ──────────────────────────────────
  - id: claude_ecosystem
    name: "Claude 生态"
    priority: high
    sources:
      github_releases:
        - anthropics/claude-code
        - anthropics/anthropic-sdk-typescript
        - anthropics/anthropic-sdk-python
        - larksuite/cli
      web:
        - url: https://www.anthropic.com/news
        - url: https://claude.ai/blog

  # ── AI 工具发现（新工具/新框架）────────────────────────────
  - id: ai_tools_discovery
    name: "AI 工具发现"
    priority: high
    sources:
      github_trending:
        period: daily
        languages: [TypeScript, JavaScript, Python]
        must_match_any:
          - claude
          - MCP
          - AI coding
          - agent
          - spec-driven
          - openspec
          - cc-switch
          - claude code
      github_search:
        queries:
          - "claude code stars:>50 created:>14days"
          - "MCP server stars:>100 pushed:>7days"
          - "claude agent stars:>30 created:>14days"
      hn:
        keywords:
          - claude code
          - spec kit
          - openspec
          - MCP server
          - AI coding
          - spec driven
          - cc-switch
        min_points: 30
      dev_community:
        tags: [claudecode, claude, ai-tools, mcp]

  # ── 国内 AI 动态 ─────────────────────────────────────────────
  # 严格限定：只保留涉及国内公司/产品的条目，过滤掉海外财报/裁员等无关信息
  - id: china_ai_trends
    name: "国内 AI 动态"
    priority: medium
    sources:
      web:
        - url: https://www.leiphone.com/
          use_jina: true          # 直连不稳定，直接走 Jina Reader
          # 必须命中以下关键词之一，否则丢弃
          must_match_any:
            - 阿里云
            - 腾讯云
            - 字节跳动
            - 百度
            - 华为云
            - 腾讯
            - 阿里
            - 字节
            - 国内
            - 中国
            - CodeBuddy
            - 通义
            - 文心
            - 混元
            - 豆包
        - url: https://www.smarthey.com/
          # 同样严格过滤，只要国内 AI 内容
          must_match_any:
            - 阿里云
            - 腾讯云
            - 字节跳动
            - 百度
            - 华为
            - 国内
            - 中国
            - 大模型
            - CodeBuddy
            - 通义
            - 文心
            - 混元
            - 豆包

  # ── MCP 生态 ─────────────────────────────────────────────────
  - id: mcp_ecosystem
    name: "MCP 生态"
    priority: medium
    sources:
      github_search:
        queries:
          - "MCP server stars:>100 pushed:>7days"
          - "model-context-protocol stars:>50 created:>14days"
      hn:
        keywords:
          - MCP server
          - model context protocol
          - MCP tool
        min_points: 20
      dev_community:
        tags: [mcp, modelcontextprotocol]
      web:
        - url: https://openclawapi.org/en/blog

  # ── Spec 驱动开发 ────────────────────────────────────────────
  - id: spec_driven_dev
    name: "Spec 驱动开发"
    priority: medium
    sources:
      github_search:
        queries:
          - "spec-driven stars:>200 pushed:>30days"
          - "openspec OR spec-kit stars:>100 pushed:>14days"
      hn:
        keywords:
          - spec driven
          - spec kit
          - openspec
          - SDD
          - spec-driven development
        min_points: 20
      web:
        - url: https://dev.to/t/ai
          must_match_any: [spec, openspec, spec-kit, SDD, spec-driven]

# ----------------------------------------------------------------
# 全局过滤规则
# ----------------------------------------------------------------
filters:
  lookback_hours: 24
  max_items_per_topic: 5
  exclude_keywords:
    - sponsored
    - advertisement
    - 广告
    - 招聘
    - 裁员           # 海外裁员新闻与关注方向无关
    - 财报           # 海外财报无关
    - 股价
  deduplicate: true            # 当次运行内跨信源去重
  seen_ttl_days: 7             # seen.json 条目保留天数，超期自动清除

# ----------------------------------------------------------------
# 输出配置
# ----------------------------------------------------------------
output:
  format: card
  include_why: true
  skip_if_empty: true
  language: zh
  # 分支命名规则：report/YYYY-MM-DD，便于按日期追溯
  branch_prefix: "report"
